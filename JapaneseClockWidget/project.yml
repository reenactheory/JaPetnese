name: JapaneseClockWidget
options:
  bundleIdPrefix: com.jaeyeon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  JapaneseClockWidget:
    type: application
    platform: iOS
    sources:
      - JapaneseClockWidget
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.jaeyeon.JapaneseClockWidget
        GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: JapaneseClockWidget/JapaneseClockWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jaeyeon.JapaneseClockWidget
    dependencies:
      - target: ClockWidgetExtension

  ClockWidgetExtension:
    type: app-extension
    platform: iOS
    product: ClockWidgetExtension
    sources:
      - ClockWidget
      - path: JapaneseClockWidget/JapaneseTimeFormatter.swift
        buildPhase: sources
      - path: JapaneseClockWidget/PetModel.swift
        buildPhase: sources
      - path: JapaneseClockWidget/PetPixelData.swift
        buildPhase: sources
      - path: JapaneseClockWidget/PetView.swift
        buildPhase: sources
    settings:
      base:
        INFOPLIST_FILE: ClockWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jaeyeon.JapaneseClockWidget.ClockWidget
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: ClockWidget/ClockWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jaeyeon.JapaneseClockWidget
